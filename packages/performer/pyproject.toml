[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "performer"
version = "0.1.0"
description = "Symphony Performer worker for Linear scheduling and Codex execution."
requires-python = ">=3.12"
dependencies = [
  "httpx>=0.27",
  "Jinja2>=3.1",
  "openai-codex==0.1.0b3",
  "performer-api==0.1.0",
]

[project.optional-dependencies]
test = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
]

[project.scripts]
performer = "performer.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
