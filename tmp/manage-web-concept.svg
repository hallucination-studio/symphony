<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1024" viewBox="0 0 1600 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3efe7"/>
      <stop offset="45%" stop-color="#e9dfd1"/>
      <stop offset="100%" stop-color="#d5c3ac"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2a23"/>
      <stop offset="100%" stop-color="#32463b"/>
