<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conductor Ops Console</title>
    <link rel="stylesheet" href="/assets/app.css">
  </head>
  <body data-dashboard-endpoint="/api/dashboard">
    <div id="app-shell">
      <aside id="nav-rail" aria-label="Primary navigation">
        <div class="brand-block">
          <strong>Conductor</strong>
          <span>Ops Console</span>
        </div>
        <nav class="nav-stack">
          <button class="nav-item active" data-route="issues" type="button">Issues</button>
          <button class="nav-item" data-route="runs" type="button">Runs</button>
          <button class="nav-item" data-route="trace" type="button">Trace</button>
          <button class="nav-item" data-route="instances" type="button">Instances</button>
          <button class="nav-item" data-route="linear" type="button">Linear</button>
          <button class="nav-item" data-route="workflow" type="button">Workflow</button>
          <button class="nav-item" data-route="retention" type="button">Retention</button>
          <button class="nav-item" data-route="settings" type="button">Settings</button>
        </nav>
      </aside>
      <main id="app-main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Issue -> Run -> Attempt -> Turn -> Trace</p>
            <h1>Conductor Ops Console</h1>
          </div>
          <div class="search-strip">
            <input id="global-search" type="search" placeholder="Search issues, runs, traces">
            <select id="status-filter" aria-label="Status filter">
              <option value="">All states</option>
              <option value="running">Running</option>
              <option value="retrying">Retrying</option>
              <option value="stalled">Stalled</option>
              <option value="completed">Completed</option>
            </select>
          </div>
        </header>
        <section class="summary-grid" aria-label="Ops summary">
          <article class="metric-tile">
            <span>Active Issues</span>
            <strong id="active-issues">0</strong>
          </article>
          <article class="metric-tile">
            <span>Runs</span>
            <strong id="run-count">0</strong>
          </article>
          <article class="metric-tile">
            <span>Retention</span>
            <strong id="retention-state">Ready</strong>
          </article>
        </section>
        <section id="view-root" class="view-panel" aria-live="polite">
          <div class="empty-state">
            <h2>Issues</h2>
            <p>Loading issue-first operations data from /api/dashboard, /api/issues, /api/runs, and /api/retention.</p>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
