x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  podium:
    image: ${PODIUM_IMAGE:-ghcr.io/hallucination-studio/symphony-podium:beta}
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      PODIUM_DATA_DIR: /var/lib/podium
    volumes:
      - podium-data:/var/lib/podium
    expose:
      - "8090"
    labels:
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/api/v1/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-podium}
      POSTGRES_USER: ${POSTGRES_USER:-podium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 30s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      podium:
        condition: service_healthy
    ports:
      - "${PODIUM_HTTP_BIND:-0.0.0.0:80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    logging: *default-logging
    environment:
      DOCKER_API_VERSION: "1.44"
    command: ["--interval", "60", "--cleanup", "--label-enable", "--rolling-restart"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  podium-data:
  postgres-data:
  redis-data:
