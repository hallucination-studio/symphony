<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Symphony">
  <!-- macOS app icon source: the Symphony downbeat mark on the standard
       824x824 icon grid (100px margin on a 1024 canvas) with transparent
       corners. The in-app brand mark (public/app-icon.svg) stays full bleed
       for avatar contexts; this file exists only for the macOS icon grid. -->
  <defs>
    <linearGradient id="sym-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818cf8" />
      <stop offset="1" stop-color="#4338ca" />
    </linearGradient>
    <linearGradient id="sym-stroke" x1="150" y1="120" x2="380" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#c7d2fe" />
    </linearGradient>
  </defs>
  <g transform="translate(100 100) scale(1.609375)">
    <rect width="512" height="512" rx="112" fill="url(#sym-bg)" />
    <path d="M168 128 L232 320 C244 356 300 356 320 316 L372 208"
          fill="none" stroke="url(#sym-stroke)" stroke-width="40"
          stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="168" cy="128" r="30" fill="#fff" />
    <circle cx="372" cy="208" r="18" fill="#fff" fill-opacity="0.55" />
  </g>
</svg>
