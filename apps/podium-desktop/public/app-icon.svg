<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Symphony">
  <!-- App avatar for Linear / OAuth apps: the Symphony conductor's downbeat
       at full bleed. Identical mark to the favicon for a consistent brand.
       The path data is shared with src/ui/brandMark.ts — keep in sync. -->
  <defs>
    <linearGradient id="sym-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818cf8" />
      <stop offset="1" stop-color="#4338ca" />
    </linearGradient>
    <linearGradient id="sym-stroke" x1="150" y1="120" x2="380" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#c7d2fe" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#sym-bg)" />
  <path d="M168 128 L232 320 C244 356 300 356 320 316 L372 208"
        fill="none" stroke="url(#sym-stroke)" stroke-width="40"
        stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="168" cy="128" r="30" fill="#fff" />
  <circle cx="372" cy="208" r="18" fill="#fff" fill-opacity="0.55" />
</svg>
