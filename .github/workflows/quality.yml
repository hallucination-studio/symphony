name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.21.0
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - run: make install
      - run: make lint
      - run: make typecheck
      - run: make test
      - run: make build

  desktop-shell-smoke:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.21.0
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: dtolnay/rust-toolchain@stable
      - name: Install workspace dependencies
        run: make install
      - name: Build runner prerequisites
        run: |
          npm run build -w @symphony/podium
          npm run build -w @symphony/conductor
      - name: Verify secret-free runner contracts
        run: npm run test:e2e:runner
      - name: Run production Desktop shell smoke
        run: npm run desktop-shell-smoke
      - name: Upload Desktop shell evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-shell-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: .test/e2e-desktop-shell/
          if-no-files-found: error
          retention-days: 7
