name: Target Workflow Live E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: symphony-target-workflow-e2e
  cancel-in-progress: false

jobs:
  target-workflow-live:
    if: (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-24.04
    environment: roadmap-v1-e2e
    timeout-minutes: 60
    env:
      SYMPHONY_E2E_RUN_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.21.0
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install workspace dependencies
        run: make install
      - name: Build runner prerequisites
        run: |
          npm run build -w @symphony/podium
          npm run build -w @symphony/conductor
      - name: Verify runner contracts without credentials
        run: npm run test:e2e:runner
      - name: Validate target workflow inputs
        env:
          SYMPHONY_E2E_LINEAR_DEV_TOKEN: ${{ secrets.SYMPHONY_E2E_LINEAR_DEV_TOKEN }}
          LINEAR_CLIENT_ID: ${{ secrets.LINEAR_CLIENT_ID }}
          SYMPHONY_E2E_LINEAR_SETUP_AUTHORIZED: ${{ vars.SYMPHONY_E2E_LINEAR_SETUP_AUTHORIZED }}
          SYMPHONY_E2E_PROJECT_SLUG_ID: ${{ vars.SYMPHONY_E2E_PROJECT_SLUG_ID }}
          SYMPHONY_E2E_CODEX_API_KEY: ${{ secrets.SYMPHONY_E2E_CODEX_API_KEY }}
          SYMPHONY_E2E_CODEX_BASE_URL: ${{ secrets.SYMPHONY_E2E_CODEX_BASE_URL }}
          SYMPHONY_E2E_CODEX_MODEL: ${{ secrets.SYMPHONY_E2E_CODEX_MODEL }}
          SYMPHONY_E2E_CODEX_ALLOWED_HOSTS: ${{ vars.SYMPHONY_E2E_CODEX_ALLOWED_HOSTS }}
        run: npm run e2e:doctor
      - name: Run target workflow E2E
        env:
          SYMPHONY_E2E_LINEAR_DEV_TOKEN: ${{ secrets.SYMPHONY_E2E_LINEAR_DEV_TOKEN }}
          LINEAR_CLIENT_ID: ${{ secrets.LINEAR_CLIENT_ID }}
          SYMPHONY_E2E_LINEAR_SETUP_AUTHORIZED: ${{ vars.SYMPHONY_E2E_LINEAR_SETUP_AUTHORIZED }}
          SYMPHONY_E2E_PROJECT_SLUG_ID: ${{ vars.SYMPHONY_E2E_PROJECT_SLUG_ID }}
          SYMPHONY_E2E_CODEX_API_KEY: ${{ secrets.SYMPHONY_E2E_CODEX_API_KEY }}
          SYMPHONY_E2E_CODEX_BASE_URL: ${{ secrets.SYMPHONY_E2E_CODEX_BASE_URL }}
          SYMPHONY_E2E_CODEX_MODEL: ${{ secrets.SYMPHONY_E2E_CODEX_MODEL }}
          SYMPHONY_E2E_CODEX_ALLOWED_HOSTS: ${{ vars.SYMPHONY_E2E_CODEX_ALLOWED_HOSTS }}
        run: npm run e2e:target-live
      - name: Upload sanitized target workflow evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: target-workflow-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: .test/e2e-target-workflow/
          if-no-files-found: error
          retention-days: 7
