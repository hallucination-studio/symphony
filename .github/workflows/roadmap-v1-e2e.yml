name: Roadmap V1 E2E

on:
  workflow_dispatch:

concurrency:
  group: roadmap-v1-e2e-hell
  cancel-in-progress: false

jobs:
  acceptance:
    runs-on: ubuntu-24.04
    environment: roadmap-v1-e2e
    timeout-minutes: 180
    env:
      SYMPHONY_E2E_PROJECT_SLUG_ID: ${{ vars.SYMPHONY_E2E_PROJECT_SLUG_ID }}
      SYMPHONY_E2E_REPOSITORY_PATH: ${{ runner.temp }}/symphony-e2e-repository
      SYMPHONY_E2E_GITHUB_REPOSITORY: ${{ vars.SYMPHONY_E2E_GITHUB_REPOSITORY }}
      SYMPHONY_E2E_GITHUB_BASE_BRANCH: ${{ vars.SYMPHONY_E2E_GITHUB_BASE_BRANCH }}
      SYMPHONY_E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      SYMPHONY_E2E_RUN_S1: "1"
      SYMPHONY_E2E_RUN_S2: "1"
      SYMPHONY_E2E_RUN_S3: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.21.0
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
      - name: Install Linux Desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential curl file libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev libwebkit2gtk-4.1-dev libxdo-dev wget xvfb
      - name: Install workspace dependencies
        run: make install
      - name: Clone allowlisted E2E repository
        env:
          GH_TOKEN: ${{ secrets.SYMPHONY_E2E_GITHUB_TOKEN }}
        run: |
          gh repo clone "$SYMPHONY_E2E_GITHUB_REPOSITORY" "$SYMPHONY_E2E_REPOSITORY_PATH"
          git -C "$SYMPHONY_E2E_REPOSITORY_PATH" checkout "$SYMPHONY_E2E_GITHUB_BASE_BRANCH"
      - name: Read-only preflight
        env: &e2e-secrets
          LINEAR_CLIENT_ID: ${{ secrets.LINEAR_CLIENT_ID }}
          LINEAR_CLIENT_SECRET: ${{ secrets.LINEAR_CLIENT_SECRET }}
          LINEAR_E2E_USER_API_KEY: ${{ secrets.LINEAR_E2E_USER_API_KEY }}
          OPENAI_E2E_API_KEY: ${{ secrets.OPENAI_E2E_API_KEY }}
          SYMPHONY_E2E_GITHUB_TOKEN: ${{ secrets.SYMPHONY_E2E_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.SYMPHONY_E2E_GITHUB_TOKEN }}
        run: npm run acceptance:v1 -- --preflight
      - name: Build E2E Desktop and sidecars
        run: npm run e2e:build
      - name: Run S1
        env: *e2e-secrets
        run: xvfb-run --auto-servernum npm run acceptance:v1 -- --scenario S1
      - name: Run S2
        env: *e2e-secrets
        run: xvfb-run --auto-servernum npm run acceptance:v1 -- --scenario S2
      - name: Run S3
        env: *e2e-secrets
        run: xvfb-run --auto-servernum npm run acceptance:v1 -- --scenario S3
      - name: Collect sanitized evidence
        if: always()
        run: npm run acceptance:collect -- --output .test/v1-acceptance
      - name: Evaluate automated and Roadmap verdicts
        if: always()
        run: npm run acceptance:evaluate -- --input .test/v1-acceptance
      - name: Upload sanitized evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: roadmap-v1-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: .test/v1-acceptance/
          if-no-files-found: error
          retention-days: 7
      - name: Cleanup run-owned state
        if: always()
        run: npm run e2e:cleanup
