name: Core Live E2E

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: symphony-core-live-e2e
  cancel-in-progress: false

jobs:
  core-live:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment: roadmap-v1-e2e
    timeout-minutes: 60
    env:
      SYMPHONY_E2E_RUN_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.21.0
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install workspace dependencies
        run: make install
      - name: Build runner prerequisites
        run: |
          npm run build -w @symphony/podium
          npm run build -w @symphony/conductor
      - name: Verify runner contracts without credentials
        run: npm run test:e2e:runner
      - name: Validate core live inputs
        env:
          SYMPHONY_E2E_LINEAR_DEV_TOKEN: ${{ secrets.SYMPHONY_E2E_LINEAR_DEV_TOKEN }}
          SYMPHONY_E2E_CODEX_API_KEY: ${{ secrets.SYMPHONY_E2E_CODEX_API_KEY }}
          SYMPHONY_E2E_CODEX_BASE_URL: ${{ vars.SYMPHONY_E2E_CODEX_BASE_URL }}
          SYMPHONY_E2E_CODEX_MODEL: ${{ vars.SYMPHONY_E2E_CODEX_MODEL }}
          SYMPHONY_E2E_CODEX_ALLOWED_HOSTS: ${{ vars.SYMPHONY_E2E_CODEX_ALLOWED_HOSTS }}
        run: npm run e2e:doctor
      - name: Run core live E2E
        env:
          SYMPHONY_E2E_LINEAR_DEV_TOKEN: ${{ secrets.SYMPHONY_E2E_LINEAR_DEV_TOKEN }}
          SYMPHONY_E2E_CODEX_API_KEY: ${{ secrets.SYMPHONY_E2E_CODEX_API_KEY }}
          SYMPHONY_E2E_CODEX_BASE_URL: ${{ vars.SYMPHONY_E2E_CODEX_BASE_URL }}
          SYMPHONY_E2E_CODEX_MODEL: ${{ vars.SYMPHONY_E2E_CODEX_MODEL }}
          SYMPHONY_E2E_CODEX_ALLOWED_HOSTS: ${{ vars.SYMPHONY_E2E_CODEX_ALLOWED_HOSTS }}
        run: npm run e2e:core-live
      - name: Cleanup run-owned state
        if: always()
        run: npm run e2e:cleanup
      - name: Upload sanitized core live evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-live-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: .test/e2e-core-live/
          if-no-files-found: error
          retention-days: 7
