<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="Symphony">
  <defs>
    <linearGradient id="sp-bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818cf8" />
      <stop offset="1" stop-color="#4338ca" />
    </linearGradient>
    <linearGradient id="sp-icon-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1" />
      <stop offset="1" stop-color="#312e81" />
    </linearGradient>
    <linearGradient id="sp-stroke" x1="150" y1="120" x2="380" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#c7d2fe" />
    </linearGradient>
    <filter id="sp-icon-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="24" flood-color="#1e1b4b" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#sp-bg)" />

  <!-- Oversized translucent downbeat bleeding off the right edge -->
  <g transform="translate(905 20) scale(1.25)" opacity="0.10">
    <path d="M168 128 L232 320 C244 356 300 356 320 316 L372 208"
          fill="none" stroke="#ffffff" stroke-width="40"
          stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="168" cy="128" r="30" fill="#ffffff" />
    <circle cx="372" cy="208" r="18" fill="#ffffff" />
  </g>

  <!-- App mark -->
  <g transform="translate(120 180) scale(0.546875)" filter="url(#sp-icon-shadow)">
    <rect width="512" height="512" rx="112" fill="url(#sp-icon-bg)" />
    <path d="M168 128 L232 320 C244 356 300 356 320 316 L372 208"
          fill="none" stroke="url(#sp-stroke)" stroke-width="40"
          stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="168" cy="128" r="30" fill="#ffffff" />
    <circle cx="372" cy="208" r="18" fill="#ffffff" fill-opacity="0.55" />
  </g>

  <!-- Wordmark -->
  <text x="460" y="330"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="112" font-weight="700" letter-spacing="-1"
        fill="#ffffff">Symphony</text>
  <text x="463" y="404"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="31" font-weight="400" letter-spacing="0.2"
        fill="rgba(255, 255, 255, 0.8)">Podium Desktop · Podium · Conductor · Performer</text>
</svg>
